services:
  # 1. FastAPI Backend Service (Frontend will be hosted on Vercel)
  - type: web
    name: agentforge-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Prompt user to input their Neon Postgres URL
      - key: GEMINI_API_KEY
        sync: false # Prompt user to input their Gemini API Key
      - key: TAVILY_API_KEY
        sync: false # Prompt user to input their Tavily API Key
      - key: MCP_SERVERS_JSON
        value: "[]"
